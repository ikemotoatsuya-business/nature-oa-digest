name: daily-nature-oa-digest

on:
  schedule:
    # UTC 22:00 = 日本時間 07:00（毎日）。時刻を変えたいときはここを編集。
    - cron: "0 22 * * *"
  workflow_dispatch:        # 画面のボタンから手動実行も可能
    inputs:
      seed_only:
        description: "初回シード（現時点の全記事を既読化するだけ。要約しない）"
        type: boolean
        default: false

permissions:
  contents: write           # 結果(output/・state/)をリポジトリへコミットするため

concurrency:
  group: nature-oa-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          MAX_ITEMS_PER_RUN: ${{ vars.MAX_ITEMS_PER_RUN || '40' }}
          REQUEST_DELAY_SEC: ${{ vars.REQUEST_DELAY_SEC || '5' }}
          OA_ONLY: ${{ vars.OA_ONLY || 'true' }}
          SEED_ONLY: ${{ inputs.seed_only || 'false' }}
        run: python src/main.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state output
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "digest: $(date -u +%Y-%m-%d)"
            git push
          fi
